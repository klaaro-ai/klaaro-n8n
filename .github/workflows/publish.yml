# Publishes n8n-nodes-klaaro to npm with provenance on version tag push.
#
# One-time npm setup (OIDC Trusted Publishing — no long-lived token):
# 1. Log in to npmjs.com → n8n-nodes-klaaro → Package settings
# 2. Publish access → Trusted Publishers → Add publisher → GitHub Actions
# 3. Repository owner: klaaro-ai
# 4. Repository name: n8n-nodes-klaaro
# 5. Workflow filename: publish.yml
#
# Fallback: set NPM_TOKEN (granular publish token) in repo Actions secrets.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
